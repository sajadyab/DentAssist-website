    <style>
      .tooth {
  /* fill removed – let the attribute or parent decide */
  stroke: #000000;
  stroke-width: 1.2;
  stroke-linejoin: round;
  transition: fill 0.2s;
  cursor: pointer;
}
      .tooth-number {
        font-family: Arial, sans-serif;
        font-size: 100px;
        font-weight: bold;
        fill: #7b7373;
        stroke: #7a6565;
        stroke-width: 0.5;
        paint-order: stroke;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
      }
      .healthy { fill: #28a745; }
      .cavity { fill: #fd7e14; }
      .filled { fill: #007bff; }
      .crown { fill: #6f42c1; }
      .root-canal { fill: #ffc107; }
      .missing { fill: #6c757d; }
      .implant { fill: #20c997; }
      .bridge { fill: #795548; }
      .has-notes { stroke: #ff0000; stroke-width: 2.5; }
    </style>
